       <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شام نت - باقاتنا للبيوت</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Tahoma, sans-serif; 
      background: linear-gradient(180deg, #0a1929 0%, #1a3a5f 100%); 
      color: white; 
      min-height: 100vh;
    }
    .navbar {
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      padding: 15px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .nav-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: center;
      gap: 40px;
    }
    .nav-content a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      transition: 0.3s;
    }
    .nav-content a:hover { color: #00d4ff; }
    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    .main-title {
      text-align: center;
      font-size: 42px;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .main-title span { color: #00d4ff; }
    .loading-text {
      text-align: center;
      color: rgba(255,255,255,0.7);
      margin-bottom: 60px;
      font-size: 16px;
    }
    .packages-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      margin-bottom: 80px;
    }
    .package-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 25px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }
    .package-card:hover {
      transform: translateY(-5px);
      border-color: #00d4ff;
      box-shadow: 0 10px 30px rgba(0,212,255,0.2);
    }
    .package-card h3 {
      font-size: 22px;
      margin-bottom: 15px;
      color: #00d4ff;
    }
    .package-info {
      margin: 12px 0;
      color: rgba(255,255,255,0.8);
    }
    .package-info i { margin-left: 8px; color: #00d4ff; }
    .package-price {
      font-size: 32px;
      font-weight: bold;
      color: #00d4ff;
      margin: 20px 0 10px;
    }
    .section-title-2 {
      text-align: center;
      font-size: 36px;
      margin-bottom: 30px;
      font-weight: bold;
    }
    .section-title-2 span { color: #00d4ff; }
    .form-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 35px;
      max-width: 600px;
      margin: 0 auto;
      backdrop-filter: blur(10px);
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: rgba(255,255,255,0.9);
      font-size: 15px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: white;
      font-size: 15px;
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.4); }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #00d4ff;
      background: rgba(255,255,255,0.12);
    }
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,212,255,0.4);
    }
    #status { margin-top: 15px; text-align: center; font-weight: bold; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-content">
      <a href="#home">الرئيسية</a>
      <a href="#features">المميزات</a>
      <a href="#packages">الباقات</a>
      <a href="#order">اطلب الآن</a>
    </div>
  </nav>

  <div class="container">
    <h1 class="main-title"><span>باقاتنا</span> للبيوت</h1>
    <p class="loading-text" id="loadingText">جاري تحميل الباقات...</p>
    
    <div id="packagesList" class="packages-grid"></div>

    <h2 class="section-title-2" id="order"><span>اطلب</span> اشتراكك</h2>
    
    <div class="form-card">
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input type="text" id="fullName" placeholder="محمد احمد">
      </div>
      <div class="form-group">
        <label>رقم الهاتف</label>
        <input type="tel" id="phone" placeholder="09xxxxxxxx">
      </div>
      <div class="form-group">
        <label>اختر الباقة</label>
        <select id="packageSelect">
          <option value="">-- اختر باقة --</option>
        </select>
      </div>
      <div class="form-group">
        <label>العنوان</label>
        <input type="text" id="address" placeholder="المدينة - الحي">
      </div>
      <button class="btn-submit" id="submitBtn">إرسال الطلب</button>
      <p id="status"></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAyilyHxKFsCKDmX4i-7zPaiMXKP4c8m74",
      authDomain: "flutter-ai-playground-c3bb0.firebaseapp.com",
      projectId: "flutter-ai-playground-c3bb0",
      storageBucket: "flutter-ai-playground-c3bb0.firebasestorage.app",
      messagingSenderId: "1055759995979",
      appId: "1:1055759995979:web:88dff2199c6c50f23769ce"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const packagesList = document.getElementById('packagesList');
    const packageSelect = document.getElementById('packageSelect');
    const loadingText = document.getElementById('loadingText');

    async function loadPackages() {
      try {
        const querySnapshot = await getDocs(collection(db, "packages"));
        if (querySnapshot.empty) {
          loadingText.textContent = 'لا توجد باقات متاحة حالياً';
          return;
        }
        loadingText.style.display = 'none';
        let html = '';
        let options = '<option value="">-- اختر باقة --</option>';
        querySnapshot.forEach((doc) => {
          const p = doc.data();
          html += `
            <div class="package-card">
              <h3>${p.name}</h3>
              <div class="package-info"><i class="fas fa-tachometer-alt"></i> السرعة: ${p.speed} Mbps</div>
              <div class="package-info"><i class="fas fa-calendar-alt"></i> المدة: ${p.duration}</div>
              <div class="package-info"><i class="fas fa-info-circle"></i> ${p.description || 'انترنت سريع'}</div>
              <div class="package-price">${p.price} ل.س</div>
            </div>
          `;
          options += `<option value="${doc.id}">${p.name} - ${p.price} ل.س</option>`;
        });
        packagesList.innerHTML = html;
        packageSelect.innerHTML = options;
      } catch (error) {
        loadingText.textContent = 'خطأ: ' + error.message;
      }
    }

    document.getElementById('submitBtn').onclick = async () => {
      const status = document.getElementById('status');
      const fullName = document.getElementById('fullName').value;
      const phone = document.getElementById('phone').value;
      const packageId = document.getElementById('packageSelect').value;
      const address = document.getElementById('address').value;
      
      if (!fullName || !phone || !packageId) {
        status.textContent = 'عبي كل الحقول المطلوبة';
        status.style.color = '#ff6b6b';
        return;
      }

      try {
        await addDoc(collection(db, "orders"), {
          fullName, phone, packageId, address,
          createdAt: serverTimestamp(),
          status: 'جديد'
        });
        status.textContent = 'تم إرسال طلبك بنجاح! رح نتواصل معك قريباً';
        status.style.color = '#00d4ff';
        document.getElementById('fullName').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('packageSelect').value = '';
        document.getElementById('address').value = '';
      } catch (e) {
        status.textContent = 'خطأ: ' + e.message;
        status.style.color = '#ff6b6b';
      }
    };

    loadPackages();
  </script>
</body>
</html>
