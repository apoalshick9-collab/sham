<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم شام نت</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --space-dark: #0B0E23; --space-blue: #00D9FF; --space-purple: #7B2FFF;
            --text-main: #FFFFFF; --text-secondary: #B8C5D6; --card-bg: rgba(255, 255, 255, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Cairo", sans-serif; background: var(--space-dark); color: var(--text-main); }
       .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); }
        nav { position: fixed; top: 0; width: 100%; padding: 20px 5%; background: rgba(11, 14, 35, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 217, 255, 0.2); z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
       .logo { font-size: 24px; font-weight: 900; background: linear-gradient(45deg, var(--space-blue), var(--space-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
       .container { max-width: 1400px; margin: 120px auto 40px; padding: 0 5%; position: relative; z-index: 1; }
       .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
       .stat-card { background: var(--card-bg); border: 1px solid rgba(0, 217, 255, 0.2); border-radius: 15px; padding: 25px; backdrop-filter: blur(10px); }
       .stat-card h3 { color: var(--space-blue); font-size: 14px; margin-bottom: 10px; }
       .stat-card p { font-size: 32px; font-weight: 900; }
       .card { background: var(--card-bg); border: 1px solid rgba(0, 217, 255, 0.2); border-radius: 20px; padding: 40px; margin-bottom: 30px; backdrop-filter: blur(10px); }
       .card h2 { color: var(--space-blue); margin-bottom: 25px; font-size: 28px; }
       .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
       .form-group { margin-bottom: 20px; text-align: right; }
       .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
       .form-group input,.form-group textarea,.form-group select { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid rgba(0, 217, 255, 0.3); background: rgba(0, 0, 0, 0.3); color: var(--text-main); font-family: "Cairo"; font-size: 16px; }
       .form-group input:focus,.form-group textarea:focus,.form-group select:focus { outline: none; border-color: var(--space-blue); }
       .btn { padding: 12px 25px; border-radius: 50px; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; }
       .btn-primary { background: linear-gradient(45deg, var(--space-blue), var(--space-purple)); color: white; }
       .btn-danger { background: #FF2E63; color: white; padding: 8px 15px; font-size: 14px; }
       .btn-warning { background: #ffa000; color: white; padding: 8px 15px; font-size: 14px; margin-left: 8px; }
       .btn-success { background: #00ff88; color: #0B0E23; padding: 8px 15px; font-size: 14px; margin-left: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        th { color: var(--space-blue); font-weight: 700; }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
       .badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
       .badge-new { background: rgba(0, 217, 255, 0.2); color: var(--space-blue); }
       .badge-processing { background: rgba(255, 160, 0, 0.2); color: #ffa000; }
       .badge-done { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
       .badge-cancelled { background: rgba(255, 46, 99, 0.2); color: #FF2E63; }
       .badge-paid { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
       .badge-pending { background: rgba(255, 160, 0, 0.2); color: #ffa000; }
       .payment-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid var(--space-blue); }
       .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
       .modal.show { display: flex; }
       .modal img { max-width: 90%; max-height: 90%; border-radius: 10px; }
       .modal-close { position: absolute; top: 20px; right: 40px; font-size: 40px; color: white; cursor: pointer; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="stars"></div>
    <nav>
        <div class="logo"><i class="fa-solid fa-user-shield"></i> لوحة تحكم شام نت</div>
        <div>مرحباً ادمن</div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>إجمالي الباقات</h3>
                <p id="totalPackages">0</p>
            </div>
            <div class="stat-card">
                <h3>الطلبات الجديدة</h3>
                <p id="newOrders">0</p>
            </div>
            <div class="stat-card">
                <h3>تم الدفع</h3>
                <p id="paidOrders">0</p>
            </div>
            <div class="stat-card">
                <h3>تم التوصيل</h3>
                <p id="deliveredOrders">0</p>
            </div>
        </div>

        <div class="card">
            <h2><i class="fa-solid fa-plus-circle"></i> إضافة / تعديل باقة</h2>
            <input type="hidden" id="editId">
            <div class="form-grid">
                <div class="form-group"><label>اسم الباقة</label><input type="text" id="name" placeholder="باقة الضوء"></div>
                <div class="form-group"><label>السرعة Mbps</label><input type="number" id="speed" placeholder="100"></div>
                <div class="form-group"><label>السعر $</label><input type="number" id="price" placeholder="25"></div>
                <div class="form-group"><label>مميزة؟</label><select id="featured"><option value="false">لا</option><option value="true">نعم - الأكثر طلباً</option></select></div>
            </div>
            <div class="form-group"><label>المميزات - كل ميزة بسطر</label><textarea id="features" rows="4" placeholder="تحميل غير محدود&#10;دعم فني 24/7&#10;راوتر مجاني"></textarea></div>
            <button class="btn btn-primary" id="saveBtn"><i class="fa-solid fa-save"></i> حفظ الباقة</button>
            <button class="btn" id="cancelBtn" style="background:#777; margin-right:10px; display:none;">إلغاء</button>
            <p id="status"></p>
        </div>

        <div class="card">
            <h2><i class="fa-solid fa-list"></i> كل الباقات</h2>
            <table>
                <thead><tr><th>الاسم</th><th>السرعة</th><th>السعر</th><th>مميزة</th><th>اجراءات</th></tr></thead>
                <tbody id="packagesTable"></tbody>
            </table>
        </div>

        <div class="card">
            <h2><i class="fa-solid fa-clipboard-list"></i> الطلبات</h2>
            <table>
                <thead><tr><th>الاسم</th><th>الهاتف</th><th>المدينة</th><th>الباقة</th><th>الحالة</th><th>الدفع</th><th>الصورة</th><th>اجراءات</th></tr></thead>
                <tbody id="ordersTable"></tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="imageModal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img id="modalImage" src="">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg0LGjb6rcMlMZUn15R73_pX2VXBOp0Xc",
            authDomain: "syriastore1-dcee8.firebaseapp.com",
            projectId: "syriastore1-dcee8",
            storageBucket: "syriastore1-dcee8.firebasestorage.app",
            messagingSenderId: "938774399039",
            appId: "1:938774399039:web:72d8b51051043b69a6d08a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const status = document.getElementById('status');

        async function loadData() {
            const packagesSnap = await getDocs(collection(db, "packages"));
            document.getElementById('totalPackages').textContent = packagesSnap.size;
            let html = '';
            packagesSnap.forEach((docSnap) => {
                const p = docSnap.data();
                html += `<tr>
                    <td>${p.name}</td><td>${p.speed} Mbps</td><td>$${p.price}</td><td>${p.featured? 'نعم' : 'لا'}</td>
                    <td>
                        <button class="btn btn-warning" onclick="editPackage('${docSnap.id}', '${p.name}', '${p.speed}', '${p.price}', ${p.featured}, \`${(p.features || []).join('\\n')}\`)">تعديل</button>
                        <button class="btn btn-danger" onclick="deletePackage('${docSnap.id}')">حذف</button>
                    </td>
                </tr>`;
            });
            document.getElementById('packagesTable').innerHTML = html || '<tr><td colspan="5">لا توجد باقات</td></tr>';

            const ordersSnap = await getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc")));
            let ordersHtml = '';
            let newCount = 0, paidCount = 0, deliveredCount = 0;

            ordersSnap.forEach((docSnap) => {
                const o = docSnap.data();
                if (o.status === 'جديد') newCount++;
                if (o.paymentStatus === 'تم الدفع') paidCount++;
                if (o.status === 'تم التوصيل') deliveredCount++;

                const date = o.createdAt? new Date(o.createdAt.seconds * 1000).toLocaleDateString('ar-SY') : '';
                const statusClass = o.status === 'جديد'? 'badge-new' : o.status === 'قيد المعالجة'? 'badge-processing' : o.status === 'تم التوصيل'? 'badge-done' : 'badge-cancelled';
                const paymentClass = o.paymentStatus === 'تم الدفع'? 'badge-paid' : 'badge-pending';

                ordersHtml += `<tr>
                    <td>${o.name}</td>
                    <td>${o.phone}</td>
                    <td>${o.city}</td>
                    <td>${o.packageName}</td>
                    <td><span class="badge ${statusClass}">${o.status}</span></td>
                    <td><span class="badge ${paymentClass}">${o.paymentStatus || 'بانتظار الدفع'}</span></td>
                    <td>${o.paymentProof? `<img src="${o.paymentProof}" class="payment-img" onclick="showImage('${o.paymentProof}')">` : '-'}</td>
                    <td>
                        <select onchange="updateOrderStatus('${docSnap.id}', this.value)" style="padding: 8px; border-radius: 8px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(0,217,255,0.3);">
                            <option value="جديد" ${o.status === 'جديد'? 'selected' : ''}>جديد</option>
                            <option value="قيد المعالجة" ${o.status === 'قيد المعالجة'? 'selected' : ''}>قيد المعالجة</option>
                            <option value="تم التوصيل" ${o.status === 'تم التوصيل'? 'selected' : ''}>تم التوصيل</option>
                            <option value="ملغي" ${o.status === 'ملغي'? 'selected' : ''}>ملغي</option>
                        </select>
                    </td>
                </tr>`;
            });

            document.getElementById('ordersTable').innerHTML = ordersHtml || '<tr><td colspan="8">لا توجد طلبات</td></tr>';
            document.getElementById('newOrders').textContent = newCount;
            document.getElementById('paidOrders').textContent = paidCount;
            document.getElementById('deliveredOrders').textContent = deliveredCount;
        }

        document.getElementById('saveBtn').onclick = async () => {
            const features = document.getElementById('features').value.split('\n').filter(f => f.trim());
            const
